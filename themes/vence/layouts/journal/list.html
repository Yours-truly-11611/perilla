{{ define "main" }}
<div class="page-header">
  <h1 class="page-header__title">Journal</h1>
  <p class="page-header__subtitle">{{ .Site.Params.journalSubtitle | default "Thoughts on design, craft, and the industry." }}</p>
</div>

<main class="journal-page site-content">
  <div class="journal-page__grid">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="journal-page-card" data-reveal>
      <time class="journal-page-card__date">{{ .Date.Format "January 2006" }}</time>
      <h2 class="journal-page-card__title">{{ .Title }}</h2>
      <p class="journal-page-card__excerpt">{{ .Description | default (.Summary | truncate 130) }}</p>
    </a>
    {{ end }}
  </div>
</main>

{{ end }}
